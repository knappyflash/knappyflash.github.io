<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>MIDI Player</title>
  <link href="midi_player.css" rel="stylesheet" type="text/css" media="all">
  <link href="../bg.css" rel="stylesheet" type="text/css" media="all">
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Orbitron&family=Monoton&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/combine/npm/tone@14.7.58,npm/@magenta/music@1.23.1/es6/core.js,npm/html-midi-player@1.5.0"></script>
</head>
<body>
  <div class="page">
    <div id="midiPlayApp">
      <h2 id="fileNameDisplay">A-Whole-New-World-(Theme-From-'Aladdin').mid</h2>
      <midi-player class="midiPlayer" id="midiPlayer" src="midi_files/A-Whole-New-World-(Theme-From-'Aladdin').mid" sound-font></midi-player>

      <div id="prevNextDiv">
        <button id="previousButton" type="button">Previous</button>
        <button id="nextButton" type="button">Next</button>
      </div>

      <div id="autoRandomDiv">
        <button id="autoPlayButton" type="button">Auto Play is Off</button>
        <button id="randomizeButton" type="button">Randomize is Off</button>
      </div>

      <div id="trackList"><ul id="midiUlList"></ul></div>
    </div>
  </div>
  <script type="module" src="midi_player.js"></script>
  <script src="../bg.js"></script>
</body>
</html>
